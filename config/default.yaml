llm:
  default_provider: "ollama"
  providers:
    ollama:
      host: "http://127.0.0.1:11434"
      model: "gemma3:4b"
      timeout: 60
    openai:
      model: "gpt-4o-mini"
      temperature: 0.1
      max_tokens: 1000
    anthropic:
      model: "claude-3-haiku-20240307"
      max_tokens: 1000
    groq:
      model: "llama3-70b-8192"
      temperature: 0.1

evaluation:
  default_scoring: "hybrid"
  semantic_threshold: 0.7
  pass_threshold: 0.6

test_suites:
  accuracy: true
  robustness: true
  safety: true
  bias: true
  rag: true
  consistency: true

output:
  save_results: true
  results_format: ["json", "html"]
  results_dir: "data/results"
  generate_visualizations: true

logging:
  level: "INFO"
  log_file: "logs/qa_lab.log"
